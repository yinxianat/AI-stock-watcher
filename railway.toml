# Railway deployment config — read on every build.
#
# Why this file exists: without it, Railway re-asks for build/start
# commands via the dashboard, and "Root Directory" must be set by hand
# (easy to forget on a fresh redeploy). Pinning the config in the repo
# means a wipe-and-redeploy still works.
#
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# The healthcheck path is served by app/main.py::healthz.
healthcheckPath = "/healthz"
healthcheckTimeout = 30
